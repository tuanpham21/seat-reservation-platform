services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seats
      POSTGRES_PASSWORD: seats
      POSTGRES_DB: seats
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seats -d seats"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
