worker_processes auto;

events {
  worker_connections 4096;
}

http {
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=seat_mutation:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=payment_checkout:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=payment_status:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;

  upstream app_upstream {
    server app:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ ^/api/auth/(login|register|refresh)$ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/seats/hold {
      limit_req zone=seat_mutation burst=10 nodelay;
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/payments/checkout {
      limit_req zone=payment_checkout burst=5 nodelay;
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/api/payments/.+$ {
      limit_req zone=payment_status burst=30 nodelay;
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/stripe/webhook {
      limit_req zone=webhook burst=50 nodelay;
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/seats/stream {
      proxy_pass http://app_upstream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      chunked_transfer_encoding on;
    }

    location / {
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
